# 這個問卷程式最重要的 3 個資料結構

---

## A. Question Bank Schema

管理「題目定義」。

### 必備欄位

* question_id
* category
* title
* description
* question_type
* required
* owner_role
* stage
* options
* depends_on
* validation_rules
* output_mapping
* quality_impact

---

## B. Project Answer Schema

管理「某專案的回答」。

### 必備欄位

* project_id
* question_id
* value
* answered_by
* answered_at
* review_status
* confidence
* notes

---

## C. Output Schema

管理「轉出的正式成果」。

### 輸出類型

* tech_stack
* ai_context
* readiness_report
* governance_summary
* prompt_context

