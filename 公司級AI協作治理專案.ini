# 我建議的 MVP 範圍

你先不要一次做很大。
先做出 **第一版能實際跑 1 個專案** 的版本就很有價值。

## MVP 先做這些就好

### 1. 題庫

先做 8 類：

* project_basic
* architecture
* backend
* frontend
* database
* api
* security
* deployment
* ai_collaboration

### 2. 題數

每類先 5–10 題。

### 3. 角色

先支援：

* PM
* Architect
* Backend
* Frontend
* DevOps

### 4. 輸出

先輸出 3 個：

* `tech-stack.json`
* `ai-context.md`
* `readiness-report.md`

### 5. 規則

先做 20–30 條高價值驗證規則。

