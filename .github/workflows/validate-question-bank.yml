# 題庫與規則的自動化驗證 workflow
# 當 question-bank/ 或 rules/ 有變更時自動執行

name: Validate Question Bank & Rules

on:
  pull_request:
    paths:
      - 'question-bank/**'
      - 'rules/**'
      - 'docs/schemas/**'

jobs:
  validate-json:
    runs-on: ubuntu-latest
    name: 驗證 JSON 格式與 Schema

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ajv ajv-formats

      - name: Validate JSON files
        run: |
          echo "=== 驗證題庫 JSON 格式 ==="
          for file in question-bank/categories/*.json; do
            echo "Validating: $file"
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" || exit 1
          done

          echo "=== 驗證規則 JSON 格式 ==="
          for file in rules/**/*.json; do
            echo "Validating: $file"
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" || exit 1
          done

          echo "=== 驗證 Schema JSON 格式 ==="
          for file in docs/schemas/*.json; do
            echo "Validating: $file"
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" || exit 1
          done

          echo "✅ 所有 JSON 檔案格式正確"

  check-question-ids:
    runs-on: ubuntu-latest
    name: 檢查題目 ID 唯一性

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check duplicate question IDs
        run: |
          echo "=== 檢查題目 ID 唯一性 ==="
          ids=$(grep -roh '"question_id": "[^"]*"' question-bank/categories/ | sort)
          duplicates=$(echo "$ids" | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "❌ 發現重複的 question_id："
            echo "$duplicates"
            exit 1
          fi
          echo "✅ 所有 question_id 唯一"

  check-rule-ids:
    runs-on: ubuntu-latest
    name: 檢查規則 ID 唯一性

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check duplicate rule IDs
        run: |
          echo "=== 檢查規則 ID 唯一性 ==="
          ids=$(grep -roh '"rule_id": "[^"]*"' rules/ | sort)
          duplicates=$(echo "$ids" | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "❌ 發現重複的 rule_id："
            echo "$duplicates"
            exit 1
          fi
          echo "✅ 所有 rule_id 唯一"
